<!DOCTYPE html>
<html>
<head>
  <title>My Website</title>
  <style>
    h1{
      text-align: center;
    }
    img {
      width: 300px; /* adjust as desired */
    }
    img:hover {
      cursor: pointer; /* change cursor to pointer on hover */
    }
    img.hover-img {
      display: none; /* initially hide hover image */
    }
    img:hover + img.hover-img {
      display: block; /* show hover image when cursor is over original image */
    }
  </style>
</head>
<body>
  <h1>Hello there, my name is Ambung Awali</h1>
  <br><br>
  <h1>My projects: <a href="https://awaliambung.github.io/kase-homepage/">Kase (Nationstates Nation)</a></h1>
  
  <br>
  <img src="https://i.imgur.com/viTNftL.jpeg" alt="My Image">
  <img class="hover-img" src="https://i.imgur.com/Uoab6pB.jpeg" alt="My hover Image">
  
</body>
</html>
